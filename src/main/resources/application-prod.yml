server:
  port: ${PORT:8084}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: LEARNING-MANAGEMENT-SERVICE

  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE:learning_management}
      auto-index-creation: true

  # Disable Kafka completely in this service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  # Placeholder Kafka config (not used because of exclude)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:learning-management-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

# ================================
# EUREKA (prod)
# ================================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:https://educonservicediscovery-64307221061.asia-south1.run.app/eureka/}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH:true}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:educonlearningmanagmentservice-64307221061.asia-south1.run.app}
    prefer-ip-address: false
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 90
    instance-id: ${eureka.instance.hostname}:${server.port}
    non-secure-port-enabled: false
    secure-port-enabled: true
    secure-port: 443
    home-page-url: https://${eureka.instance.hostname}/
    status-page-url: https://${eureka.instance.hostname}/actuator/info
    health-check-url: https://${eureka.instance.hostname}/actuator/health

# ================================
# USER / AUTH SERVICE URLS
# ================================
user:
  service:
    url: ${USER_SERVICE_URL:https://educonauthservice-64307221061.asia-south1.run.app}

auth:
  service:
    url: ${AUTH_SERVICE_URL:https://educonauthservice-64307221061.asia-south1.run.app}

# ================================
# FEIGN
# ================================
feign:
  client:
    config:
      default:
        connectTimeout: ${FEIGN_DEFAULT_CONNECT_TIMEOUT:5000}
        readTimeout: ${FEIGN_DEFAULT_READ_TIMEOUT:5000}
        loggerLevel: ${FEIGN_LOG_LEVEL:BASIC}
      user-service:
        connectTimeout: ${FEIGN_USER_CONNECT_TIMEOUT:10000}
        readTimeout: ${FEIGN_USER_READ_TIMEOUT:10000}

# ================================
# MANAGEMENT / METRICS
# ================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ================================
# LOGGING
# ================================
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.tcon.learning_management_service: ${LOG_LEVEL_APP:INFO}
    org.springframework.data.mongodb: ${LOG_LEVEL_MONGO:WARN}
    org.springframework.cloud.loadbalancer: WARN
    org.springframework.kafka: ERROR
    io.github.resilience4j: INFO
    io.netty: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
